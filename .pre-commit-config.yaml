repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --config, backend/pyproject.toml]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        args: [--config, backend/pyproject.toml]
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && uv run mypy --config-file pyproject.toml src'
        language: system
        files: ^backend/src/.*\.py$
        pass_filenames: false

      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --write "${@#frontend/}"' --
        language: system
        files: ^frontend/src/.*\.(ts|vue|js|css)$
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --fix "${@#frontend/}"' --
        language: system
        files: ^frontend/src/.*\.(ts|vue|js)$
        pass_filenames: true
